services:
  - type: web
    name: mar5aux-slack-ai-bot
    runtime: docker
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SEARCH_SCOPE
        value: workspace
      - key: EMBED_ON_INGEST
        value: "true"
      - key: MAX_CONTEXT_MESSAGES
        value: "12"
      - key: CONTEXT_NEIGHBOR_MESSAGES
        value: "2"
      - key: MAX_CONTEXT_CHARS
        value: "26000"
